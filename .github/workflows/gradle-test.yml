name: Run unit tests

permissions:
  contents: read

on:
  pull_request:
    types:
      [ opened, reopened, edited, synchronize ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@0f4528296b4bc09e8ae0fc7be30185a4ab435545 # v6.0.0

    - name: Test
      run: ./gradlew test

    - name: Publish test report on failure
      uses: actions/upload-artifact@v6
      if: failure()
      with:
        name: test-report
        path: build/reports
        if-no-files-found: ignore
        retention-days: 1
